name: CI

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      run_opencv_compare:
        description: "Run optional cvh/cv compare job"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  lite_all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lite Full Test Suite (core + imgproc)
        run: ./scripts/ci_lite_all.sh

  full_all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Full Full Test Suite (core + imgproc)
        run: ./scripts/ci_full_all.sh

  opencv_compare:
    needs: [lite_all, full_all]
    if: >
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'ci/run-opencv-compare')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_opencv_compare == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CVH/CV Compare (log-only)
        env:
          CVH_COMPARE_PROFILE: quick
          CVH_COMPARE_IMPLS: full,lite
          CVH_COMPARE_THREADS: "1"
          CVH_COMPARE_OMP_DYNAMIC: "false"
          CVH_COMPARE_OMP_PROC_BIND: "close"
        run: ./scripts/ci_compare_log_only.sh
